version: "3.9"
services:
  grass:
    container_name: grass-community-store-grass
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    privileged: true # Fondamentale per avere i permessi di rete pieni
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    ports:
      - "6080:3000" # Mappiamo la 6080 (quella che vuole Umbrel) alla 3000 (quella interna del desktop)
    shm_size: "1gb"
    restart: unless-stopped
