version: "3.9"
services:
  grass: # Il nome deve essere "grass" così Umbrel lo riconosce
    container_name: grass-community-store-grass
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    privileged: true # Questo aiuta a sbloccare la Network Quality
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    ports:
      - "3000:3000" # Umbrel di solito cerca l'app sulla porta 3000 o 80
    shm_size: "1gb"
    restart: unless-stopped
